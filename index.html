<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Первая страница</title>
</head>
<body>
<div class="section-block">
    <div class="section-block__column">
        <div class="video-fon">
            <video class="video-block" autoplay muted loop poster="image/video-poster.jpg">
                <source src="main.mp4" type="video/mp4">
                <source src="main.webm" type="video/webm">
            </video>
        </div>
        <header class="header">
            <div class="header__logo"><img src="image/logo.png" draggable="false"></div>
            <nav class="header__menu">
                <ul class="header__menu-items">
                    <li>
                        <a href="#" class="header__menu__link">Front-end</a>
                    </li>
                    <li>
                        <a href="#" class="header__menu__link">Back-end</a>
                    </li>
                    <li>
                        <a href="#" class="header__menu__link">Чи</a>
                    </li>
                    <li>
                        <a href="#" class="header__menu__link">Да</a>
                    </li>
                </ul>
            </nav>
            <div class="header__lang">
                <div class="header__lang-menu">
                    <span class="header__lang__text">Русский</span>
                    <img class="header__lang__angle-down" src="image/angle-down-solid.svg">
                </div>
            </div>
        </header>
        <div class="wrapper">
            <span class="title-videofon">Hobby</span>
            <img src="image/first-page-videofon-centr-icon.svg" draggable="false">
            <span class="title-videofon">Work</span>
        </div>
        <div class="section-block_bottom">
            <span class="section-block_bottom-text">Сайт в разработке</span>
        </div>
    </div>
</div>
<div class="section-block">
    <div class="section-block__sliders-wrapper">
        <div class="section-block__first-sliders">
            <div class="section-block__second-sliders">
                <div class="section-block__second-sliders__slide-1">
                    <img src="image/for-slide1_mini.jpg">
                </div>
                <div class="section-block__second-sliders__slide-2">
                    <img src="image/relax.jpg">
                </div>
                <div class="section-block__second-sliders__slide-3">
                    <img src="image/for-slide3_mini.jpg">
                </div>
                <div class="section-block__second-sliders__slide-4">
                    <img src="image/for-slide2_mini.jpg">
                </div>
                <div class="section-block__second-sliders__slide-5">
                    <img src="image/for-slide_mini.jpg">
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
